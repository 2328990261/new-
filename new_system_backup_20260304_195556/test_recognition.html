<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能识别测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h1 {
            color: #409EFF;
            text-align: center;
        }
        .section {
            margin: 20px 0;
        }
        .section h3 {
            color: #303133;
            border-left: 4px solid #409EFF;
            padding-left: 10px;
        }
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 12px;
            border: 1px solid #DCDFE6;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        button {
            background: #409EFF;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background: #66B1FF;
        }
        .result {
            background: #F4F4F5;
            padding: 15px;
            border-radius: 4px;
            margin-top: 15px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
        }
        .success {
            color: #67C23A;
        }
        .error {
            color: #F56C6C;
        }
        .warning {
            color: #E6A23C;
        }
        .info {
            color: #909399;
        }
        .test-text {
            background: #FDF6EC;
            border: 1px solid #E6A23C;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .test-text pre {
            margin: 5px 0;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .tip {
            background: #EDF2FC;
            border-left: 4px solid #409EFF;
            padding: 12px;
            margin: 15px 0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 智能识别文本分割测试</h1>
        
        <div class="tip">
            <strong>💡 测试说明：</strong><br>
            这个页面用于测试文本分割逻辑，帮助你理解如何正确格式化多个家教单。
        </div>

        <div class="section">
            <h3>步骤 1: 使用预设测试文本</h3>
            <button onclick="useTestText1()">✅ 正确格式（3个家教单，有空行）</button>
            <button onclick="useTestText2()">❌ 错误格式（无空行）</button>
            <button onclick="useTestText3()">✅ 你的案例（2个家教单）</button>
        </div>

        <div class="section">
            <h3>步骤 2: 输入或粘贴文本</h3>
            <textarea id="inputText" placeholder="在这里输入或粘贴文本..."></textarea>
        </div>

        <div class="section">
            <h3>步骤 3: 测试分割</h3>
            <button onclick="testSplit()">🚀 测试分割</button>
            <button onclick="clearAll()">🗑️ 清空</button>
        </div>

        <div class="section">
            <h3>步骤 4: 查看结果</h3>
            <div id="result" class="result"></div>
        </div>

        <div class="section">
            <h3>📖 正确格式示例</h3>
            <div class="test-text">
                <strong>✅ 正确（家教单之间有空行）：</strong>
                <pre>深圳南山区 初二数学
【课费】150/次

北京海淀区 高三物理
【课费】250/次</pre>
            </div>
            
            <div class="test-text" style="background: #FEF0F0; border-color: #F56C6C;">
                <strong>❌ 错误（家教单之间无空行）：</strong>
                <pre>深圳南山区 初二数学
【课费】150/次
北京海淀区 高三物理
【课费】250/次</pre>
            </div>
        </div>
    </div>

    <script>
        // 预设测试文本 1：正确格式（有空行）
        function useTestText1() {
            document.getElementById('inputText').value = `深圳南山区 初二数学
【学生情况】男孩，数学基础较好
【课费薪酬】180-200/次

北京海淀区 高三物理
【学生情况】女孩，物理成绩中等
【课费薪酬】250-300/次

上海浦东新区 小五英语
【学生情况】男孩，英语口语较弱
【课费薪酬】120-150/次`;
            log('<span class="success">✅ 已加载正确格式测试文本（3个家教单，有空行）</span>');
        }

        // 预设测试文本 2：错误格式（无空行）
        function useTestText2() {
            document.getElementById('inputText').value = `深圳南山区 初二数学
【学生情况】男孩，数学基础较好
【课费薪酬】180-200/次
北京海淀区 高三物理
【学生情况】女孩，物理成绩中等
【课费薪酬】250-300/次
上海浦东新区 小五英语
【学生情况】男孩，英语口语较弱
【课费薪酬】120-150/次`;
            log('<span class="error">❌ 已加载错误格式测试文本（无空行，会被识别为1个）</span>');
        }

        // 预设测试文本 3：你的案例
        function useTestText3() {
            document.getElementById('inputText').value = `S 广州天河区宝翠园 小六英语
【学生情况】女孩，成绩一般注意力差点主要带娃每天背单词，读英语，做点题目
【上课次数】9月开始，周一到周五下午2点30可以上课，开学后估计每周1.2次2h/次
【课费薪酬】140-160/次
【家教要求】有经验的英语专业要学过自然拼读法的，要求华师

S 深圳龙华大浪 初二语文数学英语
【学生情况】女孩，成绩一般
【上课次数】周一到周五下午5点后，周末全天
【课费薪酬】260/次
【家教要求】女老师，有经验`;
            log('<span class="success">✅ 已加载你的案例（2个家教单）</span>');
        }

        // 测试分割
        function testSplit() {
            const text = document.getElementById('inputText').value;
            
            if (!text.trim()) {
                log('<span class="error">❌ 请先输入文本</span>');
                return;
            }

            log('==================== 开始测试 ====================');
            log(`📝 输入文本长度: ${text.length} 字符`);
            log(`📝 输入文本预览 (前100字符):\n${text.substring(0, 100)}...`);
            
            // 模拟后端的分割逻辑：按两个或更多换行符分割
            const items = text.split(/\n{2,}/);
            const validItems = items.filter(item => item.trim() !== '');
            
            log(`\n🎯 分割结果:`);
            log(`   总共分割成: <span class="warning">${validItems.length}</span> 个家教单`);
            
            if (validItems.length === 1 && text.includes('\n')) {
                log('\n<span class="error">⚠️ 警告：检测到多行文本但只分割出1个家教单</span>');
                log('<span class="error">   可能原因：家教单之间没有空行（只有单个换行）</span>');
                log('<span class="error">   解决方案：在每个家教单之间添加一个完整的空行</span>');
            } else if (validItems.length > 1) {
                log(`\n<span class="success">✅ 成功分割成 ${validItems.length} 个家教单</span>`);
            }
            
            log('\n📋 各家教单详情:');
            validItems.forEach((item, index) => {
                const preview = item.trim().substring(0, 60);
                log(`\n   第 ${index + 1} 个家教单:`);
                log(`   长度: ${item.trim().length} 字符`);
                log(`   预览: ${preview}${item.trim().length > 60 ? '...' : ''}`);
                
                // 简单识别
                const hasCity = /深圳|广州|北京|上海|天津|重庆/.test(item);
                const hasDistrict = /区|县|镇/.test(item);
                const hasGrade = /小[一二三四五六]|初[一二三]|高[一二三]/.test(item);
                const hasSubject = /语文|数学|英语|物理|化学|生物/.test(item);
                const hasSalary = /\d+(?:-\d+)?[元\/次小时课时]/.test(item);
                
                const recognizedFields = [];
                if (hasCity) recognizedFields.push('城市');
                if (hasDistrict) recognizedFields.push('区域');
                if (hasGrade) recognizedFields.push('年级');
                if (hasSubject) recognizedFields.push('科目');
                if (hasSalary) recognizedFields.push('薪资');
                
                if (recognizedFields.length > 0) {
                    log(`   <span class="success">识别到: ${recognizedFields.join('、')}</span>`);
                } else {
                    log(`   <span class="warning">⚠️ 未识别到关键信息</span>`);
                }
            });
            
            log('\n==================== 测试完成 ====================');
            
            // 给出建议
            if (validItems.length < 2 && text.split('\n').length > 5) {
                log('\n<span class="warning">💡 建议：</span>');
                log('   1. 确保每个家教单之间有完整的空行');
                log('   2. 空行不能包含空格或制表符，必须是完全空白的行');
                log('   3. 可以使用上面的"正确格式"按钮查看示例');
            }
        }

        // 清空
        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('result').innerHTML = '';
        }

        // 日志输出
        function log(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML += message + '\n';
            resultDiv.scrollTop = resultDiv.scrollHeight;
        }

        // 页面加载时显示欢迎信息
        window.onload = function() {
            log('🎉 欢迎使用智能识别测试工具！');
            log('📖 请按照上方步骤进行测试\n');
            log('提示：点击"正确格式"按钮可以加载示例文本');
        };
    </script>
</body>
</html>
