server
{
    listen 80;
    listen 443 ssl http2;
    server_name t.jiajiao91.com;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/jiajiaoxitong/public;
    
    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/t.jiajiao91.com.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START
    #error_page 404/404.html;
    ssl_certificate    /www/server/panel/vhost/cert/t.jiajiao91.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/t.jiajiao91.com/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START
    #error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    #PHP-INFO-START
    include enable-php-74.conf;
    #PHP-INFO-END

    #REWRITE-START
    include /www/server/panel/vhost/rewrite/t.jiajiao91.com.conf;
    #REWRITE-END

    # ==================== API路由配置 ====================
    # 注意：API路由必须在前端路由之前配置，避免被前端路由拦截
    
    # 管理后台 API（最高优先级）
    location ^~ /admin/api/ {
        if (!-e $request_filename) {
            rewrite ^/admin/api/(.*)$ /index.php?s=/admin/api/$1 last;
        }
    }
    
    # 用户端 API
    location ^~ /api/ {
        if (!-e $request_filename) {
            rewrite ^/api/(.*)$ /index.php?s=/api/$1 last;
        }
    }
    
    # ==================== 前端静态文件（Vue SPA）====================
    
    # 管理后台前端（Vue SPA）
    location /admin {
        alias /www/wwwroot/jiajiaoxitong/public/admin;
        try_files $uri $uri/ /admin/index.html;
        
        # 支持 HTML5 History 模式
        location ~ ^/admin/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /www/wwwroot/jiajiaoxitong/public/admin;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # 用户端前端（Vue SPA）
    location /user {
        alias /www/wwwroot/jiajiaoxitong/public/user;
        try_files $uri $uri/ /user/index.html;
        
        # 支持 HTML5 History 模式
        location ~ ^/user/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /www/wwwroot/jiajiaoxitong/public/user;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ==================== ThinkPHP 路由重写 ====================
    
    # ThinkPHP URL 重写
    location / {
        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.php?s=/$1 last;
        }
    }

    # ==================== PHP 处理 ====================
    
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/tmp/php-cgi-74.sock;
        fastcgi_index index.php;
        include fastcgi.conf;
        
        # 增加 PHP 脚本超时时间（用于处理上传等耗时操作）
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # ==================== 静态资源优化 ====================
    
    # 上传文件目录（指向实际的uploads目录）
    location /uploads/ {
        # 根据实际部署结构，可能需要使用alias指向backend/public/uploads
        # 如果public是软链接到backend/public，则不需要修改
        # 否则使用下面的alias配置
        # alias /www/wwwroot/jiajiaoxitong/backend/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 静态资源缓存配置
    location ~* \.(js|css)$ {
        expires 12h;
        add_header Cache-Control "public";
    }
    
    location ~* \.(png|jpg|jpeg|gif|bmp|swf|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    location ~* \.(woff|woff2|ttf|eot|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ==================== 安全设置 ====================
    
    #禁止访问的文件或目录
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }
    
    # 禁止访问敏感目录
    location ~ ^/(app|config|route|runtime|vendor|database|extend)/
    {
        deny all;
    }
    
    # 禁止访问备份文件
    location ~ ~$ {
        deny all;
    }
    
    # 禁止访问配置文件
    location ~* \.(ini|conf|env|log)$ {
        deny all;
    }

    #一键申请SSL证书验证目录相关设置
    location ~ \.well-known{
        allow all;
    }

    #禁止在证书验证目录放入敏感文件
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    # ==================== 日志配置 ====================
    
    access_log  /www/wwwlogs/t.jiajiao91.com.log;
    error_log  /www/wwwlogs/t.jiajiao91.com.error.log;
}

